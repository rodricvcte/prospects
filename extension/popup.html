<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>Prospects</title>
    <style>
      body {
        margin: 0;
        width: 260px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        background: #fafafa;
        color: #171717;
      }
      .container {
        padding: 16px;
      }
      h1 {
        font-size: 14px;
        font-weight: 600;
        margin: 0 0 4px;
      }
      .atual {
        font-size: 12px;
        color: #737373;
        margin: 0 0 14px;
      }
      .atual strong {
        color: #171717;
        font-weight: 600;
      }
      #lista-contas {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .conta-btn {
        text-align: left;
        border: 1px solid #e5e5e5;
        background: #fff;
        border-radius: 6px;
        padding: 8px 10px;
        font-size: 13px;
        cursor: pointer;
        color: #171717;
      }
      .conta-btn:hover {
        border-color: #a3a3a3;
      }
      .conta-btn.selecionada {
        border-color: #171717;
        background: #171717;
        color: #fff;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Conta de origem</h1>
      <p class="atual">Selecionada: <strong id="conta-atual">—</strong></p>
      <div id="lista-contas"></div>
    </div>
    <script src="config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
